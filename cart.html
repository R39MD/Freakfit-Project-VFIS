<!DOCTYPE html>
<html lang="en">
<head>
<title>FREAKFIT - Cart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:ital,wght@0,500;0,700;1,700&display=swap');

:root {
    --bg-dark: #050505;
    --text-light: #fffffb;
    --accent-pink: #f62a99;
    --accent-blue: #2800ea;
    --accent-green: #d2fe05;
    --font-head: 'Oswald', sans-serif;
    --font-body: 'Inter', sans-serif;
}

html {
    scroll-behavior: smooth;
}

@keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}


.loader-wrapper {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: var(--bg-dark);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    animation: fadeOutLoader 0.8s ease-in-out 0.8s forwards;
    pointer-events: none;
}
.loader-logo {
    font-family: var(--font-head);
    font-size: 60px;
    font-weight: 900;
    font-style: italic;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 2px;
    transform: skewX(-10deg);
    animation: pulseLogo 0.8s ease-in-out infinite alternate;
}
.loader-logo span {
    color: var(--accent-green);
}
.loader-bar {
    width: 200px;
    height: 4px;
    background-color: rgba(255,255,255,0.1);
    margin-top: 20px;
    position: relative;
    overflow: hidden;
}
.loader-bar::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 50%;
    background-color: var(--accent-pink);
    animation: loadingBar 0.8s ease-in-out infinite;
}

@keyframes fadeOutLoader {
    0% { opacity: 1; visibility: visible; }
    100% { opacity: 0; visibility: hidden; }
}
@keyframes pulseLogo {
    0% { text-shadow: 0 0 10px var(--accent-pink); transform: skewX(-10deg) scale(1); }
    100% { text-shadow: 0 0 20px var(--accent-pink), 0 0 40px var(--accent-pink); transform: skewX(-10deg) scale(1.05); }
}
@keyframes loadingBar {
    0% { left: -50%; }
    100% { left: 100%; }
}

body {
    margin: 0;
    font-family: var(--font-body);
    background-color: var(--bg-dark);
    background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url("https://picsum.photos/seed/bg/1920/1080");
    background-size: cover;
    background-attachment: fixed;
    color: var(--text-light);
    overflow-x: hidden;
    animation: fadeSlideIn 0.6s ease-out forwards;
}


::-webkit-scrollbar { width: 10px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--accent-pink); border-radius: 5px; }

.topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background-color: rgba(0, 0, 0, 0.85);
    backdrop-filter: blur(10px);
    padding: 15px 5%;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.topbar .nav {
    list-style: none;
    display: flex;
    gap: 30px;
    margin: 0;
    padding: 0;
}
.topbar .nav li a {
    color: var(--text-light);
    font-family: var(--font-head);
    font-size: 22px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.3s ease;
}
.topbar .nav li a:hover {
    color: var(--accent-pink);
}


.logo {
    font-family: var(--font-head);
    font-size: 36px;
    font-weight: 900;
    font-style: italic;
    color: var(--text-light);
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: inline-block;
    transform: skewX(-10deg);
    transition: transform 0.3s ease, text-shadow 0.3s ease, border-color 0.3s ease;
    border: 3px solid var(--text-light);
    padding: 0px 10px;
    line-height: 1.2;
}
.logo span {
    color: var(--accent-green);
}
.logo:hover {
    transform: skewX(-10deg) scale(1.05);
    text-shadow: 4px 4px 0px var(--accent-pink);
    border-color: var(--accent-green);
}


.cart-container {
    padding: 80px 5%;
    max-width: 1000px;
    margin: 0 auto;
    min-height: 60vh;
}
.cart-container h1 {
    font-family: var(--font-head);
    font-style: italic;
    font-size: clamp(2.5rem, 5vw, 4rem);
    margin: 0 0 40px 0;
    text-transform: uppercase;
    color: var(--text-light);
    text-shadow: 2px 2px 0px var(--accent-pink);
}
.cart-item {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    gap: 20px;
    transition: transform 0.3s ease, border-color 0.3s ease;
}
.cart-item:hover {
    transform: translateY(-5px);
    border-color: var(--accent-blue);
}
.cart-item img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 8px;
}
.cart-item-details {
    flex-grow: 1;
}
.cart-item-title {
    font-family: var(--font-head);
    font-size: 1.5rem;
    margin: 0 0 5px 0;
    text-transform: uppercase;
}
.cart-item-meta {
    color: #ccc;
    font-size: 1.1rem;
    margin: 0 0 10px 0;
}
.cart-item-price {
    color: var(--accent-green);
    font-family: var(--font-head);
    font-size: 1.5rem;
}
.cart-item-remove {
    background: transparent;
    border: 1px solid var(--accent-pink);
    color: var(--accent-pink);
    padding: 10px 20px;
    font-family: var(--font-head);
    font-size: 1rem;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
}
.cart-item-remove:hover {
    background: var(--accent-pink);
    color: var(--text-light);
}
.cart-summary {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--accent-blue);
    border-radius: 12px;
    padding: 30px;
    margin-top: 40px;
    text-align: right;
}
.cart-total {
    font-family: var(--font-head);
    font-size: 2.5rem;
    margin-bottom: 20px;
    text-transform: uppercase;
}
.cart-total span {
    color: var(--accent-green);
}
.pay-btn {
    background: var(--accent-green);
    color: var(--bg-dark);
    border: none;
    padding: 20px 50px;
    font-family: var(--font-head);
    font-size: 1.8rem;
    text-transform: uppercase;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: bold;
}
.pay-btn:hover {
    background: var(--text-light);
    transform: translateY(-3px);
    box-shadow: 0 10px 20px rgba(210, 254, 5, 0.3);
}
.empty-cart {
    text-align: center;
    font-size: 1.5rem;
    color: #aaa;
    padding: 80px 0;
    font-family: var(--font-head);
    text-transform: uppercase;
}

@media (max-width: 768px) {
    .topbar { flex-direction: column; gap: 15px; padding: 20px 5%; }
    .topbar .nav { flex-wrap: wrap; justify-content: center; gap: 15px; }
    .cart-item { flex-direction: column; text-align: center; }
    .cart-summary { text-align: center; }
}
</style>
</head>

<body>


<div class="loader-wrapper">
    <div class="loader-logo">FREAK<span>FIT</span></div>
    <div class="loader-bar"></div>
</div>

<div class="topbar">
    <a href="index.html" class="logo">FREAK<span>FIT</span></a>
    <ul class="nav">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Products</a></li>
        <li><a href="About_us.html">About Us</a></li>
        <li><a href="cart.html" class="cart-link">Cart (0)</a></li>
    </ul>
</div>


<div class="cart-container">
    <h1>Your Cart</h1>
    <div id="cart-items"></div>
    <div id="cart-summary" class="cart-summary" style="display: none;">
        <div class="cart-total">Total: <span id="cart-total-price">$0.00</span></div>
        <button class="pay-btn" onclick="payNow()">Pay Now</button>
    </div>
</div>

<script>
function updateCartCount() {
    const cart = JSON.parse(localStorage.getItem('freakfit_cart')) || [];
    const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
    const cartLinks = document.querySelectorAll('.cart-link');
    cartLinks.forEach(link => {
        link.innerText = `Cart (${totalQty})`;
    });
}

function renderCart() {
    const cart = JSON.parse(localStorage.getItem('freakfit_cart')) || [];
    const cartItemsContainer = document.getElementById('cart-items');
    const cartSummary = document.getElementById('cart-summary');
    const cartTotalPrice = document.getElementById('cart-total-price');

    if (cart.length === 0) {
        cartItemsContainer.innerHTML = '<div class="empty-cart">Your cart is empty. Go add some freakish gear!</div>';
        cartSummary.style.display = 'none';
        return;
    }

    let html = '';
    let total = 0;

    cart.forEach((item, index) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
            <div class="cart-item">
                <img src="${item.image}" alt="${item.name}">
                <div class="cart-item-details">
                    <h3 class="cart-item-title">${item.name}</h3>
                    <p class="cart-item-meta">Size: ${item.size} | Qty: ${item.qty}</p>
                    <div class="cart-item-price">$${itemTotal.toFixed(2)}</div>
                </div>
                <button class="cart-item-remove" onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    cartItemsContainer.innerHTML = html;
    cartTotalPrice.innerText = `$${total.toFixed(2)}`;
    cartSummary.style.display = 'block';
}

function removeItem(index) {
    let cart = JSON.parse(localStorage.getItem('freakfit_cart')) || [];
    cart.splice(index, 1);
    localStorage.setItem('freakfit_cart', JSON.stringify(cart));
    renderCart();
    updateCartCount();
}

function payNow() {
    alert('Processing payment... Thank you for your purchase!');
    localStorage.removeItem('freakfit_cart');
    renderCart();
    updateCartCount();
}

document.addEventListener('DOMContentLoaded', () => {
    updateCartCount();
    renderCart();
});
</script>

</body>
</html>
